server {
    listen 80;
    server_name .store.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name store.com www.store.com;

    http2 on;

    include nginx/conf.d/common.conf;

    location ~ \.php$ {
        include nginx/conf.d/fastcgi.conf;
        fastcgi_pass main_webserver:9000;
        fastcgi_param APP_CONTEXT "store";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
